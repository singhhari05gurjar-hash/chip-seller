<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#fff;
}

.card{
    width:340px;
    background:#1f2937;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(255,193,7,.3);
}

.card img{
    width:120px;
    border-radius:20px;
}

h1{
    margin:15px 0 10px;
}

p{
    color:#d1d5db;
    line-height:1.5;
}

#joinBtn{
    display:block;
    margin-top:25px;
    padding:16px;
    background:#FFC107;
    color:#000;
    text-decoration:none;
    font-weight:bold;
    border-radius:40px;
    font-size:22px;
    transition:.3s;
}

#joinBtn:hover{
    background:#ffb300;
}

<body>

<div class="card">

<img src="./logo.jpeg" alt="Logo">

<h1>Chip Seller</h1>

<p>Join our trusted Telegram community for premium deals and instant updates.</p>

<a id="joinBtn" href="https://t.me/chipsellerinstall" target="_blank">
Join Telegram
</a>

</div>

<script>
document.getElementById("joinBtn").addEventListener("click", function(e){

    e.preventDefault();

    fbq('track', 'subscribe', {}, function () {
        window.open("https://t.me/chipsellerinstall", "_blank");
    });

    // Fallback if callback doesn't fire
    setTimeout(function(){
        window.open("https://t.me/chipsellerinstall", "_blank");
    },1000);

});
</script>
